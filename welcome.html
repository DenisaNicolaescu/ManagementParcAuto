<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="welcome.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>AutoDock</title>


</head>

<body>
    <div class="container">
        <div class="left-panel">
            <div class="logo">
                <img src="logo.png" alt="Autodock Logo" class="logo-img">
            </div>
            <div class="tagline">Smart, efficient and centralized<br>fleet management</div>
            <hr class="divider">
            <ul class="features">
               <li><img src="icon1.svg" alt="icon" class="list-icon"> <div>Real-time dashboard and<br>statistics</div></li>
               <li><i class="far fa-clock"></i> <div>Alerts for expiring<br>documents</div></li>
               <li><i class="far fa-calendar-alt"></i> <div>Integrated service<br>calendar</div></li>
               <li><i class="fas fa-shield-alt"></i> <div>Insurance and vignette<br>management</div></li>
            </ul>
        </div>

        <div class="right-panel">
            <h1>Welcome!</h1>
            <div class="subtitle">Sign in to your account</div>

            <div class="role-selector">
                <div class="role-btn">
                    <i class="fas fa-user-shield"></i>
                Manager
                </div>
                <div class="role-btn">
                    <i class="far fa-user"></i>
                User
                </div>
            </div>
            

           <form class="login-form">
            <div class="input-group">
                <label>Username or Email:</label>
                <input type="text">
            </div>
            <div class="input-group">
                <label>Password:</label>
                <input type="password">
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pwd">Forgot password?</a>
            </div>
            
            <button type="button" class="sign-in-btn">Sign in</button>
        </form>

        </div>
    </div>
     
</body>
</html>
